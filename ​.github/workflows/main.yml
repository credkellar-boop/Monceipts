name: Monceipts CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🛠 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Essential for receipt rendering worker
          playwright install chromium
          playwright install-deps

      - name: 🧹 Linting (Flake8)
        run: |
          flake8 app/backend --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🔗 Monad connectivity & Core Logic Test
        env:
          MONAD_RPC_URL: "https://rpc-devnet.monad.xyz"
          CHAIN_ID: "10143"
        run: |
          pytest app/backend/tests/test_core.py -v
